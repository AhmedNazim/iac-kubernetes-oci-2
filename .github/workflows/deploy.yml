name: Deploy K8s Cluster

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      destroy:
        description: "Run terraform destroy instead of apply"
        type: boolean
        default: false

env:
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.ARM_ACCESS_KEY }}

jobs:

  # ---------- 1. Validation (fmt + validate + plan) ----------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Inject SSH public key
        env:
          SSH_PUB: ${{ secrets.SSH_PUBLIC_KEY }}
        run: printf '%s\n' "$SSH_PUB" > /tmp/azure_k8s.pub

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          subscription_id       = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          worker_count          = 2
          ssh_public_key_path   = "/tmp/azure_k8s.pub"
          location              = "francecentral"
          resource_group_name   = "RG-GAN-FRC"
          control_plane_vm_size = "Standard_D2s_v3"
          worker_vm_size        = "Standard_F1s"
          EOF

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ---------- 2. Apply (gated by approval) ----------
  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: production     # ← déclenche la demande d'approbation
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Inject SSH public key
        env:
          SSH_PUB: ${{ secrets.SSH_PUBLIC_KEY }}
        run: printf '%s\n' "$SSH_PUB" > /tmp/azure_k8s.pub

      - name: Generate tfvars
        run: |
          cat > terraform.tfvars <<EOF
          subscription_id       = "${{ secrets.ARM_SUBSCRIPTION_ID }}"
          worker_count          = 2
          ssh_public_key_path   = "/tmp/azure_k8s.pub"
          location              = "francecentral"
          resource_group_name   = "RG-GAN-FRC"
          control_plane_vm_size = "Standard_D2s_v3"
          worker_vm_size        = "Standard_F1s"
          EOF

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  # ---------- 3. Ansible (configure les VMs) ----------
  ansible:
    name: Ansible Configure
    needs: terraform-apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible + jq
        run: sudo apt-get update -qq && sudo apt-get install -y ansible jq

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/azure_k8s
          chmod 600 ~/.ssh/azure_k8s

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Generate inventory from Terraform outputs
        run: |
          cd ../terraform && terraform init -input=false
          CP_IP=$(terraform output -raw control_plane_ip)
          W1_IP=$(terraform output -json node_public_ips | jq -r '."worker-1"')
          W2_IP=$(terraform output -json node_public_ips | jq -r '."worker-2"')
          cd ../ansible
          mkdir -p inventory
          cat > inventory/hosts.ini <<EOF
          [control_plane]
          $CP_IP

          [workers]
          $W1_IP
          $W2_IP

          [k8s_cluster:children]
          control_plane
          workers

          [all:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/azure_k8s
          ansible_ssh_common_args='-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF
          cat inventory/hosts.ini

      - name: Wait for SSH
        run: |
          CP_IP=$(grep -A1 '^\[control_plane\]' inventory/hosts.ini | tail -1)
          for i in {1..30}; do
            ssh -i ~/.ssh/azure_k8s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=5 ubuntu@$CP_IP "echo ok" && break
            sleep 10
          done

      - name: Ping hosts
        run: ansible -i inventory/hosts.ini k8s_cluster -m ping

      - name: Run playbooks
        run: ansible-playbook playbooks/site.yml

  # ---------- 4. Validation finale ----------
  validate:
    name: Validate Cluster
    needs: ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/azure_k8s
          chmod 600 ~/.ssh/azure_k8s

      - name: Verify 3 Ready nodes
        working-directory: terraform
        run: |
          terraform init -input=false
          CP_IP=$(terraform output -raw control_plane_ip)
          OUTPUT=$(ssh -i ~/.ssh/azure_k8s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ubuntu@$CP_IP "/usr/bin/kubectl --kubeconfig=/home/ubuntu/.kube/config get nodes --no-headers")
          echo "$OUTPUT"
          READY=$(echo "$OUTPUT" | grep -c " Ready ")
          if [ "$READY" -ne 3 ]; then
            echo "::error::Expected 3 Ready nodes, got $READY"
            exit 1
          fi
          echo "✅ 3 Ready nodes"